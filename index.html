<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Workouts</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Workouts">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f8;
      --card: #ffffff;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #111827;
      --text-muted: #6b7280;
      --orange: #f59e0b;
      --orange-bg: #fff7ed;
      --orange-border: #fed7aa;
      --orange-text: #b45309;
      --green: #10b981;
      --green-bg: #ecfdf5;
      --green-border: #a7f3d0;
      --green-text: #047857;
      --blue: #3b82f6;
      --blue-bg: #eff6ff;
      --blue-border: #bfdbfe;
      --blue-text: #1d4ed8;
      --purple: #8b5cf6;
      --purple-bg: #f5f3ff;
      --purple-border: #ddd6fe;
      --purple-text: #6d28d9;
      --rest-bg: #fffbeb;
      --rest-text: #92400e;
      --shadow: 0 1px 2px rgba(0,0,0,0.04);
    }

    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 16px;
    }

    .brand {
      padding: 14px 0 10px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
    }
    .brand h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .brand .meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    nav.tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 2px 0 12px;
      scrollbar-width: none;
    }
    nav.tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-muted);
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      white-space: nowrap;
      font-family: inherit;
    }
    .tab:hover { border-color: var(--border-strong); color: var(--text); }
    .tab.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    main { padding: 20px 0 80px; }

    .day-title {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .day-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 18px;
    }

    .block {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .block.accent-orange { border-left: 3px solid var(--orange); }
    .block.accent-green  { border-left: 3px solid var(--green); }
    .block.accent-blue   { border-left: 3px solid var(--blue); }
    .block.accent-purple { border-left: 3px solid var(--purple); }
    .block.accent-main   { border-left: 3px solid var(--text); }

    .block-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .block-header .meta { font-size: 11px; font-weight: 600; letter-spacing: 0.4px; opacity: 0.8; }

    .accent-orange .block-header { color: var(--orange-text); background: var(--orange-bg); border-bottom-color: var(--orange-border); }
    .accent-green  .block-header { color: var(--green-text);  background: var(--green-bg);  border-bottom-color: var(--green-border); }
    .accent-blue   .block-header { color: var(--blue-text);   background: var(--blue-bg);   border-bottom-color: var(--blue-border); }
    .accent-purple .block-header { color: var(--purple-text); background: var(--purple-bg); border-bottom-color: var(--purple-border); }
    .accent-main   .block-header { color: #fff; background: var(--text); border-bottom-color: var(--text); }

    ul.exercises { list-style: none; }

    .exercise {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .exercise:last-child { border-bottom: none; }

    .exercise-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .exercise .name {
      font-weight: 600;
      font-size: 15px;
      flex: 0 0 auto;
      max-width: 55%;
    }
    .exercise .prescription {
      color: var(--text-muted);
      font-size: 14px;
      text-align: right;
      flex: 1 1 auto;
    }

    .exercise-log {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .exercise-log input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      -webkit-appearance: none;
      appearance: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .exercise-log input:focus {
      outline: none;
      border-color: var(--text);
      background: var(--card);
    }
    .exercise-log input::placeholder { color: var(--text-muted); }
    .last-entry {
      font-size: 12px;
      color: var(--text-muted);
      padding-left: 2px;
    }
    .last-entry strong {
      color: var(--text);
      font-weight: 600;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin: 22px 0 8px;
      padding-left: 2px;
    }
    .section-label:first-child { margin-top: 0; }

    @media (max-width: 520px) {
      .exercise-top {
        flex-direction: column;
        align-items: stretch;
        gap: 2px;
      }
      .exercise .name { max-width: 100%; }
      .exercise .prescription { text-align: left; }
    }

    footer {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 24px 16px;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="brand">
        <h1>Workouts</h1>
        <span class="meta" id="today-meta"></span>
      </div>
      <nav class="tabs" role="tablist" id="tabs">
        <button class="tab" data-day="monday" role="tab">Mon</button>
        <button class="tab" data-day="tuesday" role="tab">Tue</button>
        <button class="tab" data-day="wednesday" role="tab">Wed</button>
        <button class="tab" data-day="thursday" role="tab">Thu</button>
        <button class="tab" data-day="friday" role="tab">Fri</button>
        <button class="tab" data-day="saturday" role="tab">Sat</button>
        <button class="tab" data-day="sunday" role="tab">Sun</button>
      </nav>
    </div>
  </header>

  <main>
    <div class="container" id="content"></div>
  </main>

  <footer>Tap a day to switch.</footer>

  <script>
    const dailyWarmup = {
      title: 'Daily Warm-up',
      subtitle: '20 yards each',
      accent: 'blue',
      exercises: [
        { name: 'Heel Walk',       prescription: '20 yards' },
        { name: 'Toe Walk',        prescription: '20 yards' },
        { name: 'Quad Stretch',    prescription: '20 yards' },
        { name: 'Hamstring March', prescription: '20 yards' },
        { name: 'Karioka',         prescription: '20 yards' },
        { name: 'Lateral Shuffle', prescription: '20 yards' },
        { name: 'Skips',           prescription: '20 yards' },
        { name: 'Bear Crawls',     prescription: '20 yards' }
      ]
    };

    const staticStretch = {
      title: 'Static Stretch',
      subtitle: 'Daily',
      accent: 'purple',
      exercises: [
        { name: 'Couch Stretch',             prescription: '2 min' },
        { name: 'Elevated Pigeon Stretch',   prescription: '2 min' },
        { name: "World's Greatest Stretch",  prescription: '5/side w/ hamstring sit back' },
        { name: 'Frog Pose',                 prescription: '1 min' },
        { name: 'Calf Stretches',            prescription: '1 min' }
      ]
    };

    const activation1 = {
      title: 'Activation 1',
      subtitle: '3 rounds',
      accent: 'orange',
      exercises: [
        { name: 'Glute Bridge w/ 25 lb Ball', prescription: '10' },
        { name: 'Bird Dog',                   prescription: '10' },
        { name: 'Clam-shell Openers',         prescription: '10/side' },
        { name: 'Step-downs',                 prescription: '10/leg' }
      ]
    };

    const activation2 = {
      title: 'Activation 2',
      subtitle: '3 rounds',
      accent: 'green',
      exercises: [
        { name: 'Single Leg Glute Bridge', prescription: '10/leg' },
        { name: 'Copenhagen',              prescription: '20 sec' },
        { name: 'Bird Dog',                prescription: '10' },
        { name: 'Alternating Lunges',      prescription: '10' }
      ]
    };

    const carryCircuit = {
      title: 'Carry Circuit',
      subtitle: 'Mon / Thu',
      accent: 'orange',
      exercises: [
        { name: 'DB Farmer Carry',      prescription: "100' — pick moderate weights" },
        { name: 'Suitcase Carry',       prescription: "100' / side" },
        { name: 'Goblet Forward Lunge', prescription: '5 / side' },
        { name: 'Dumbbell Step Up',     prescription: "10 / side — go lighter if needed" }
      ]
    };

    const sandbagCircuit = {
      title: 'Sandbag Circuit',
      subtitle: 'Tue / Fri',
      accent: 'green',
      exercises: [
        { name: 'Sandbag Over the Shoulder', prescription: '4 × 8' },
        { name: 'Sandbag Zercher Carry',     prescription: "100'" },
        { name: 'Jump Rope',                 prescription: '100 reps' },
        { name: 'Medicine Ball Slams',       prescription: '10' }
      ]
    };

    const monday = {
      title: 'Monday',
      subtitle: 'Bench + core',
      accent: 'main',
      exercises: [
        { name: 'Bench Press', prescription: '3 × 5 (3–5 min rest)' },
        { name: 'Plank',       prescription: '3 × 60 sec (60 sec rest)' }
      ]
    };

    const tuesday = {
      title: 'Tuesday',
      subtitle: 'Squat + core',
      accent: 'main',
      exercises: [
        { name: 'Squats',     prescription: '3 × 5 (3–5 min rest)' },
        { name: 'Side Plank', prescription: '4 × 30 sec' }
      ]
    };

    const wednesday = {
      title: 'Wednesday',
      subtitle: 'Accessories',
      accent: 'main',
      exercises: [
        { name: 'Single Arm DB Bench', prescription: '3 × 8' },
        { name: 'DB Single Arm Row',   prescription: '3 × 8–12' },
        { name: 'Tricep Extensions',   prescription: '3 × 10' },
        { name: 'Bicep Curls',         prescription: '3 × 10' },
        { name: 'Plank',               prescription: '3 × 60 sec (60 sec rest)' }
      ]
    };

    const thursday = {
      title: 'Thursday',
      subtitle: 'OHP + core',
      accent: 'main',
      exercises: [
        { name: 'Standing OHP', prescription: '3 × 5 (3–5 min rest)' },
        { name: 'Side Plank',   prescription: '4 × 30 sec' }
      ]
    };

    const friday = {
      title: 'Friday',
      subtitle: 'Deadlift + core',
      accent: 'main',
      exercises: [
        { name: 'Deadlift', prescription: '1 × 5' },
        { name: 'Plank',    prescription: '3 × 60 sec (60 sec rest)' }
      ]
    };

    const saturday = {
      title: 'Saturday',
      subtitle: 'Repeat Wednesday',
      accent: 'main',
      exercises: wednesday.exercises.slice()
    };

    const zone2Short = {
      title: 'Zone 2 Cardio',
      subtitle: 'After finisher',
      accent: 'blue',
      minMinutes: 25,
      maxMinutes: 30,
      exercises: [
        { name: 'Row or Bike', prescription: '25–30 min @ Zone 2' }
      ]
    };

    const zone2Medium = {
      title: 'Zone 2 Cardio',
      subtitle: 'Primary cardio (no finisher)',
      accent: 'blue',
      minMinutes: 45,
      maxMinutes: 50,
      exercises: [
        { name: 'Row or Bike', prescription: '45–50 min @ Zone 2' }
      ]
    };

    const zone2Long = {
      title: 'Zone 2 Cardio',
      subtitle: 'After main lifts',
      accent: 'blue',
      minMinutes: 50,
      maxMinutes: 55,
      exercises: [
        { name: 'Row or Bike', prescription: '50–55 min @ Zone 2' }
      ]
    };

    const zone2Extended = {
      title: 'Zone 2 Cardio',
      subtitle: 'Long session',
      accent: 'blue',
      minMinutes: 60,
      maxMinutes: 65,
      exercises: [
        { name: 'Row or Bike', prescription: '60–65 min @ Zone 2' }
      ]
    };

    const WEEKLY_ZONE2_TARGET = { min: 180, max: 240 };

    const schedule = {
      monday:    { lifts: monday,    circuit: carryCircuit,   zone2: null },
      tuesday:   { lifts: tuesday,   circuit: null,           zone2: zone2Medium },
      wednesday: { lifts: wednesday, circuit: null,           zone2: zone2Long },
      thursday:  { lifts: thursday,  circuit: carryCircuit,   zone2: null },
      friday:    { lifts: friday,    circuit: sandbagCircuit, zone2: zone2Short },
      saturday:  { lifts: saturday,  circuit: null,           zone2: zone2Extended },
      sunday:    { rest: true }
    };

    const activationByDay = {
      monday:    activation2,
      tuesday:   activation1,
      wednesday: activation2,
      thursday:  activation1,
      friday:    activation2,
      saturday:  activation1
    };

    const dayLabels = {
      monday: 'Monday', tuesday: 'Tuesday', wednesday: 'Wednesday',
      thursday: 'Thursday', friday: 'Friday', saturday: 'Saturday',
      sunday: 'Sunday'
    };

    const LOG_KEY = 'workouts_log_v1';

    function todayISO() {
      const d = new Date();
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function loadLog() {
      try { return JSON.parse(localStorage.getItem(LOG_KEY)) || {}; }
      catch (e) { return {}; }
    }

    function saveLog(log) {
      try { localStorage.setItem(LOG_KEY, JSON.stringify(log)); }
      catch (e) {}
    }

    function getEntry(exerciseName, dateISO) {
      const log = loadLog();
      return (log[exerciseName] && log[exerciseName][dateISO]) || '';
    }

    function setEntry(exerciseName, dateISO, value) {
      const log = loadLog();
      if (!log[exerciseName]) log[exerciseName] = {};
      const trimmed = value.trim();
      if (trimmed) log[exerciseName][dateISO] = trimmed;
      else delete log[exerciseName][dateISO];
      if (log[exerciseName] && Object.keys(log[exerciseName]).length === 0) {
        delete log[exerciseName];
      }
      saveLog(log);
    }

    function getLatestPrior(exerciseName, beforeDateISO) {
      const log = loadLog();
      const entries = log[exerciseName];
      if (!entries) return null;
      const dates = Object.keys(entries).filter(d => d < beforeDateISO).sort();
      if (dates.length === 0) return null;
      const last = dates[dates.length - 1];
      return { date: last, value: entries[last] };
    }

    function formatLogDate(dateISO) {
      const parts = dateISO.split('-').map(Number);
      const date = new Date(parts[0], parts[1] - 1, parts[2]);
      return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function weeklyZone2Totals() {
      let min = 0, max = 0;
      Object.values(schedule).forEach(d => {
        if (d.zone2) {
          min += d.zone2.minMinutes || 0;
          max += d.zone2.maxMinutes || 0;
        }
      });
      return { min, max };
    }

    function renderBlock(block, options) {
      const opts = options || {};
      const el = document.createElement('div');
      el.className = 'block accent-' + (block.accent || 'orange');

      const header = document.createElement('div');
      header.className = 'block-header';
      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = block.title;
      header.appendChild(label);
      if (block.subtitle) {
        const meta = document.createElement('span');
        meta.className = 'meta';
        meta.textContent = block.subtitle;
        header.appendChild(meta);
      }
      el.appendChild(header);

      const ul = document.createElement('ul');
      ul.className = 'exercises';
      const today = todayISO();
      block.exercises.forEach(ex => {
        const li = document.createElement('li');
        li.className = 'exercise';

        const top = document.createElement('div');
        top.className = 'exercise-top';
        const name = document.createElement('span');
        name.className = 'name';
        name.textContent = ex.name;
        const pres = document.createElement('span');
        pres.className = 'prescription';
        pres.textContent = ex.prescription;
        top.appendChild(name);
        top.appendChild(pres);
        li.appendChild(top);

        if (opts.log) {
          const logWrap = document.createElement('div');
          logWrap.className = 'exercise-log';

          const input = document.createElement('input');
          input.type = 'text';
          input.placeholder = 'Log what you did…';
          input.autocomplete = 'off';
          input.spellcheck = false;
          input.setAttribute('aria-label', 'Log for ' + ex.name);
          input.value = getEntry(ex.name, today);
          input.addEventListener('input', () => {
            setEntry(ex.name, today, input.value);
          });
          logWrap.appendChild(input);

          const prior = getLatestPrior(ex.name, today);
          if (prior) {
            const lastEl = document.createElement('div');
            lastEl.className = 'last-entry';
            lastEl.innerHTML =
              'Last: <strong></strong> — <span></span>';
            lastEl.querySelector('strong').textContent = prior.value;
            lastEl.querySelector('span').textContent = formatLogDate(prior.date);
            logWrap.appendChild(lastEl);
          }

          li.appendChild(logWrap);
        }

        ul.appendChild(li);
      });
      el.appendChild(ul);
      return el;
    }

    function renderDay(dayKey) {
      const day = schedule[dayKey];
      const content = document.getElementById('content');
      content.innerHTML = '';

      const title = document.createElement('h2');
      title.className = 'day-title';
      title.textContent = dayLabels[dayKey];
      content.appendChild(title);

      if (day.rest) {
        const sub = document.createElement('div');
        sub.className = 'day-sub';
        sub.textContent = 'Rest day — recover, hydrate, sleep.';
        content.appendChild(sub);

        const totals = weeklyZone2Totals();
        const target = WEEKLY_ZONE2_TARGET;

        let status;
        if (totals.max < target.min)         status = 'Below target — add volume';
        else if (totals.min >= target.min && totals.max <= target.max) status = 'On target';
        else if (totals.min >= target.max)   status = 'Above target — watch recovery';
        else if (totals.min >= target.min)   status = 'On target (upper end)';
        else                                  status = 'Range overlaps target';

        const summary = {
          title: 'Weekly Zone 2 Summary',
          subtitle: '4 sessions (Tue, Wed, Fri, Sat)',
          accent: 'blue',
          exercises: [
            { name: 'Planned',  prescription: totals.min + '–' + totals.max + ' min' },
            { name: 'Hours',    prescription: (totals.min / 60).toFixed(1) + '–' + (totals.max / 60).toFixed(1) + ' hr' },
            { name: 'Target',   prescription: target.min + '–' + target.max + ' min (3–4 hr)' },
            { name: 'Status',   prescription: status }
          ]
        };

        const summaryLabel = document.createElement('div');
        summaryLabel.className = 'section-label';
        summaryLabel.textContent = 'This Week';
        content.appendChild(summaryLabel);
        content.appendChild(renderBlock(summary));
        return;
      }

      const sub = document.createElement('div');
      sub.className = 'day-sub';
      sub.textContent = day.lifts.subtitle || '';
      content.appendChild(sub);

      const prepLabel = document.createElement('div');
      prepLabel.className = 'section-label';
      prepLabel.textContent = 'Prep — do every day';
      content.appendChild(prepLabel);

      content.appendChild(renderBlock(dailyWarmup));
      content.appendChild(renderBlock(staticStretch));
      const todaysActivation = { ...activationByDay[dayKey], title: 'Activation' };
      content.appendChild(renderBlock(todaysActivation));

      const liftsLabel = document.createElement('div');
      liftsLabel.className = 'section-label';
      liftsLabel.textContent = "Today's Lifts";
      content.appendChild(liftsLabel);

      const liftsBlock = { ...day.lifts, title: 'Main Lifts', subtitle: day.lifts.subtitle };
      content.appendChild(renderBlock(liftsBlock, { log: true }));

      if (day.circuit) {
        const circuitLabel = document.createElement('div');
        circuitLabel.className = 'section-label';
        circuitLabel.textContent = 'Finisher Circuit';
        content.appendChild(circuitLabel);
        content.appendChild(renderBlock(day.circuit, { log: true }));
      }

      if (day.zone2) {
        const zone2Label = document.createElement('div');
        zone2Label.className = 'section-label';
        zone2Label.textContent = 'Conditioning';
        content.appendChild(zone2Label);
        content.appendChild(renderBlock(day.zone2));
      }
    }

    function getDefaultDay() {
      const map = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
      return map[new Date().getDay()];
    }

    function setTodayMeta() {
      const opts = { weekday: 'long', month: 'short', day: 'numeric' };
      document.getElementById('today-meta').textContent =
        new Date().toLocaleDateString(undefined, opts);
    }

    function setupTabs(defaultDay) {
      const tabs = document.querySelectorAll('.tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderDay(tab.dataset.day);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        if (tab.dataset.day === defaultDay) tab.classList.add('active');
      });
    }

    const defaultDay = getDefaultDay();
    setTodayMeta();
    setupTabs(defaultDay);
    renderDay(defaultDay);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
